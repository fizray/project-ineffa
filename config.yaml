system:
  mode: "attendance" # Options: "attendance", "enrollment"
  gpu_enabled: true
  debug_mode: false
  log_level: "INFO"

input:
  # Source configuration
  # For Webcam: use integer (e.g., 0, 1)
  # For RTSP: use string (e.g., "rtsp://admin:pass@192.168.1.10:554/stream")
  source: 0
  # source: "rtsp://admin:password@192.168.1.100:554/cam1"

  width: 1280
  height: 720
  fps_limit: 60
  reconnect_delay: 5 # Seconds to wait before reconnecting RTSP

  # Image Preprocessing for CCTV/Bad Lighting
  preprocessing:
    enable_clahe: true # Improves contrast in shadows/glare
    clahe_clip_limit: 2.0
    clahe_tile_grid_size: 8

detection:
  # Options: "yolov8n-face", "buffalo_l" (RetinaFace), "buffalo_s"
  model_name: "buffalo_l"
  confidence_threshold: 0.4 # Lowered for CCTV to catch harder faces
  nms_threshold: 0.4
  input_size: 1280 # For CCTV, increase to 1280 or -1 (original size). Warning: Lowers FPS!

liveness:
  enabled: false
  model_path: "models/2.7_80x80_MiniFASNetV2.onnx"
  threshold: 0.7

recognition:
  model_name: "buffalo_l" # InsightFace model pack (contains ArcFace)
  similarity_threshold: 0.55 # Slightly lower for CCTV (faces are blurrier)
  min_face_size: 40 # Lowered to detect faces further away

tracking:
  enabled: true
  algorithm: "centroid" # Options: "centroid", "bytetrack" (future)
  max_disappeared: 30 # Frames to keep ID alive without detection
  distance_threshold: 50 # Pixel distance for centroid matching

attendance:
  cooldown_seconds: 30 # Ignore same person for X seconds after logging
  quality_threshold: 0.0 # Minimum face quality score (if available) to process

storage:
  embeddings_path: "data/embeddings.json"
  logs_path: "data/attendance.csv"
  snapshots_path: "snapshots/"
  gallery_path: "gallery/"

ui:
  window_name: "Face Attendance System (Rebuild)"
  display_width: 960
  display_height: 540
  show_fps: true
  show_bbox: true
  show_landmarks: true
  font_scale: 0.6
